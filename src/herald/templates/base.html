<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 { font-size: 22px; color: #1a1a1a; }
        h2 { font-size: 18px; color: #2a2a2a; border-bottom: 1px solid #eee; padding-bottom: 4px; }
        table {
            border-collapse: collapse;
            width: 100%;
            margin: 16px 0;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px 12px;
            text-align: left;
        }
        th { background-color: #f5f5f5; font-weight: 600; }
        tr:nth-child(even) { background-color: #fafafa; }
        .action-item { margin: 8px 0; padding-left: 4px; }
        .metric-up { color: #16a34a; }
        .metric-down { color: #dc2626; }
    </style>
</head>
<body>
    {{content}}
</body>
</html>
